<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SABTI | Coming Soon</title>
    <link rel="icon" href="sabti-icon.svg" type="image/svg+xml" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2563eb, #22c55e);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            color: #333;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .logo img {
            max-width: 700px;
            width: 100%;
            height: auto;
        }

        .tagline {
            font-size: 14px;
            margin-top: 5px;
            color: #22c55e;
            font-weight: 500;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 15px;
            color: #111;
        }

        p {
            font-size: 17px;
            margin-bottom: 35px;
            color: #555;
        }

        .contact {
            margin-top: 30px;
            font-size: 16px;
        }

        .contact a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
        }

        .contact a:hover {
            color: #22c55e;
            text-decoration: underline;
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #777;
        }


        /* -------- MOBILE RESPONSIVE -------- */

        @media (max-width: 768px) {

            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 28px;
            }

            p {
                font-size: 16px;
            }

        }

        @media (max-width: 480px) {

            .container {
                padding: 25px 18px;
                border-radius: 10px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 15px;
            }

            .logo img {
                max-width: 370px;
            }

            .contact {
                font-size: 14px;
            }

            .footer {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo"><img src="sabti-logo.svg"  alt="Simple And Better Tech Innovations"></div>
        <div class="tagline">
            <!-- Simple and Better Technology Innovations Pvt Ltd OPC -->
        </div>

        <h1>🚀 Website Coming Soon</h1>

        <p>
            We are building something amazing and will launch soon.
        </p>

        <div class="contact">
            <p>📧 Contact us: <a href="mailto:sabti.in@outlook.com">sabti.in@outlook.com</a>
            </p>
        </div>
        <div class="footer">© 2026 SABTI. All rights reserved.</div>
    </div>
</body>

</html>
